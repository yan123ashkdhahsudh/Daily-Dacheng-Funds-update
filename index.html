<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大成·招行重点持营业绩速览</title>
  <style>
    :root {
      --red: #d71920;
      --deep-red: #a60912;
      --gold: #f5b642;
      --ink: #1a1a1a;
      --muted: #6f6f6f;
      --line: #ead8c6;
      --paper: #fffaf2;
      --panel: #ffffff;
      --green: #12805c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(245, 182, 66, 0.26), transparent 30rem),
        linear-gradient(180deg, #fff7ed 0%, #fff 42%, #f7f1e9 100%);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
    }

    .app {
      width: min(820px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: grid;
      gap: 12px;
      justify-items: center;
      text-align: center;
      padding: 18px 10px 12px;
    }

    h1 {
      margin: 0;
      color: var(--deep-red);
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1.12;
      letter-spacing: 0;
      font-weight: 900;
    }

    .stars {
      color: var(--gold);
      font-size: 28px;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .bank-switcher {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 2px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .bank-switcher select {
      min-width: 168px;
      height: 40px;
      border: 1px solid #caa16e;
      border-radius: 6px;
      padding: 0 34px 0 12px;
      color: #5b2a0d;
      background: #fffaf2;
      font: inherit;
      font-weight: 800;
    }

    .board {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 242, 0.94);
      box-shadow: 0 22px 60px rgba(130, 38, 10, 0.13);
    }

    .copy-panel {
      margin-top: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 16px 42px rgba(130, 38, 10, 0.1);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    button {
      min-height: 36px;
      border: 1px solid #caa16e;
      border-radius: 6px;
      padding: 0 12px;
      color: #6b2f08;
      background: #fff4df;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #ffe8bd;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .content {
      padding: 18px clamp(16px, 4vw, 34px) 22px;
    }

    .group {
      margin: 0 0 15px;
    }

    .group-title {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
      color: #842014;
      font-size: 21px;
      font-weight: 900;
      line-height: 1.35;
    }

    .items {
      display: grid;
      gap: 3px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: baseline;
      min-height: 30px;
      font-size: clamp(19px, 4.6vw, 27px);
      line-height: 1.35;
      font-weight: 800;
    }

    .item-name {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .item-name::before {
      content: "◆";
      margin-right: 5px;
      color: #2b91c9;
      font-size: 0.76em;
    }

    .value {
      color: var(--red);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .value.negative {
      color: var(--green);
    }

    .featured {
      margin: 18px 0 16px;
      padding: 8px 0 10px;
      border-top: 1px dashed #d3b28d;
      border-bottom: 1px dashed #d3b28d;
    }

    .headline {
      display: block;
      margin: 2px 0 4px;
      color: var(--deep-red);
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 900;
      text-align: center;
      line-height: 1.4;
    }

    .featured-item {
      margin: 8px 0 10px;
      font-size: clamp(20px, 4.8vw, 29px);
      font-weight: 900;
      line-height: 1.35;
    }

    .featured-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
    }

    .ytd {
      margin-top: 3px;
      color: #b7111b;
      font-size: 0.86em;
      font-weight: 900;
    }

    .divider {
      height: 1px;
      margin: 12px 0;
      background: linear-gradient(90deg, transparent, #c9a06e, transparent);
    }

    .indexes {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      font-size: clamp(18px, 4vw, 25px);
      font-weight: 850;
      line-height: 1.35;
    }

    .index-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: baseline;
    }

    .template-lines {
      display: grid;
      gap: 7px;
      font-size: clamp(18px, 4.1vw, 25px);
      font-weight: 820;
      line-height: 1.42;
    }

    .template-line {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .template-line.group {
      margin-top: 10px;
      color: #842014;
      font-size: clamp(19px, 4.4vw, 27px);
      font-weight: 950;
    }

    .template-line.fund_item,
    .template-line.featured_item,
    .template-line.product_card {
      font-weight: 880;
    }

    .template-line.featured_header {
      margin: 12px 0 2px;
      color: var(--deep-red);
      font-size: clamp(21px, 4.8vw, 31px);
      font-weight: 950;
      text-align: center;
    }

    .template-line.featured_item,
    .template-line.featured_ytd {
      color: #b7111b;
      font-weight: 950;
    }

    .template-line.note {
      color: #7b3e1b;
      font-size: 0.9em;
      font-weight: 800;
    }

    .template-line.divider {
      height: auto;
      margin: 9px 0 1px;
      color: #7d6049;
      text-align: center;
      letter-spacing: 0;
    }

    .template-line.index {
      font-size: clamp(17px, 3.8vw, 23px);
      font-weight: 850;
    }

    footer {
      padding: 14px clamp(16px, 4vw, 34px) 18px;
      border-top: 1px solid var(--line);
      color: #7a5a42;
      background: #fff;
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
    }

    .loading,
    .error {
      padding: 28px;
      color: var(--muted);
      text-align: center;
      font-size: 16px;
      line-height: 1.7;
    }

    .error {
      color: var(--deep-red);
    }

    .copy-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fffaf2;
    }

    .copy-title {
      color: #842014;
      font-size: 17px;
      font-weight: 900;
      line-height: 1.35;
    }

    .copy-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .wechat-text {
      min-height: 320px;
      margin: 0;
      padding: 16px;
      overflow-x: auto;
      color: #1f1b18;
      background: #fff;
      font: 700 17px/1.72 -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    @media (max-width: 560px) {
      .app {
        width: min(100vw - 16px, 820px);
        padding-top: 10px;
      }

      .toolbar {
        align-items: stretch;
      }

      button {
        width: 100%;
      }

      .bank-switcher select {
        width: 100%;
      }

      .copy-actions {
        width: 100%;
      }

      .item,
      .featured-row,
      .index-row {
        grid-template-columns: 1fr;
        gap: 1px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1 id="title">大成·招行重点持营业绩速览</h1>
      <div class="stars">┈┈┈★★★★★ ┈┈┈</div>
      <label class="bank-switcher" for="bankSelect">
        选择银行
        <select id="bankSelect" aria-label="选择银行"></select>
      </label>
    </header>

    <section class="board" aria-live="polite">
      <div class="toolbar">
        <div class="status" id="status">正在读取最新数据...</div>
        <button id="refresh" type="button">刷新数据</button>
      </div>
      <div class="content" id="content">
        <div class="loading">正在生成速览...</div>
      </div>
      <footer id="footer">数据来源：wind，基金有风险，投资需谨慎</footer>
    </section>

    <section class="copy-panel">
      <div class="copy-header">
        <div class="copy-title">微信可复制文案</div>
        <div class="copy-actions">
          <button id="copyWechat" type="button">复制微信文案</button>
        </div>
      </div>
      <pre class="wechat-text" id="wechatText">正在生成微信文案...</pre>
    </section>
  </main>

  <script>
    const DATA_URL = "data/performance.json";
    const title = document.getElementById("title");
    const status = document.getElementById("status");
    const content = document.getElementById("content");
    const footer = document.getElementById("footer");
    const refresh = document.getElementById("refresh");
    const bankSelect = document.getElementById("bankSelect");
    const copyWechat = document.getElementById("copyWechat");
    const wechatText = document.getElementById("wechatText");
    let latestWechatText = "";
    let latestPayload = null;
    let selectedBankId = new URLSearchParams(window.location.search).get("bank") || localStorage.getItem("selectedBank") || "";

    function signedPercent(value) {
      if (value === null || value === undefined || value === "") return "";
      const number = Number(value);
      const sign = number > 0 ? "+" : "";
      return `${sign}${number.toFixed(2)}%`;
    }

    function valueClass(value) {
      return Number(value) < 0 ? "value negative" : "value";
    }

    function itemLabel(item) {
      return item.manager ? `${item.manager}｜${item.name}` : item.name;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderGroup(group) {
      const items = group.items.map((item) => `
        <li class="item">
          <span class="item-name">${escapeHtml(itemLabel(item))}</span>
          <span class="${valueClass(item.dailyReturn)}">${signedPercent(item.dailyReturn)}</span>
        </li>
      `).join("");

      return `
        <section class="group">
          <div class="group-title">🏆＃${escapeHtml(group.label)}</div>
          <ul class="items">${items}</ul>
        </section>
      `;
    }

    function renderFeatured(items) {
      return `
        <section class="featured">
          ${items.map((item) => {
            if (item.headline) {
              return `<span class="headline">🟥${escapeHtml(item.name)}🟥</span>`;
            }
            return `
              <div class="featured-item">
                <div class="featured-row">
                  <span>🟥${escapeHtml(item.name)}</span>
                  <span class="${valueClass(item.dailyReturn)}">${signedPercent(item.dailyReturn)}</span>
                </div>
                ${item.yearToDate === undefined || item.yearToDate === null ? "" : `<div class="ytd">📈今年以来➕${Number(item.yearToDate).toFixed(2)}%💥</div>`}
              </div>
            `;
          }).join("")}
        </section>
      `;
    }

    function renderIndexes(indexes) {
      return `
        <div class="divider"></div>
        <section class="indexes">
          ${indexes.map((item) => `
            <div class="index-row">
              <span>【${escapeHtml(item.name)}】 今日</span>
              <span class="${valueClass(item.dailyReturn)}">${signedPercent(item.dailyReturn)}</span>
            </div>
          `).join("")}
        </section>
      `;
    }

    function renderTemplateLines(lines) {
      return `
        <section class="template-lines">
          ${(lines || []).map((line) => (
            `<div class="template-line ${escapeHtml(line.type || "text")}">${escapeHtml(line.text || "")}</div>`
          )).join("")}
        </section>
      `;
    }

    function buildWechatText(data) {
      if (data.wechatText) return data.wechatText;
      const lines = [
        `⭕️ ${data.title || "大成·招行重点持营业绩速览"}`,
        "",
        "┈┈┈🌟🌟🌟🌟🌟 ┈┈┈"
      ];

      (data.groups || []).forEach((group) => {
        lines.push(`🏆＃${group.label}`);
        (group.items || []).forEach((item) => {
          lines.push(`🔹${itemLabel(item)}${signedPercent(item.dailyReturn)}`);
        });
      });

      if ((data.featured || []).length) {
        lines.push("");
        (data.featured || []).forEach((item) => {
          if (item.headline) {
            lines.push(`🟥${item.name}🟥`);
            return;
          }
          lines.push(`🟥${itemLabel(item)}${signedPercent(item.dailyReturn)}`);
          if (item.yearToDate !== undefined && item.yearToDate !== null) {
            lines.push(`📈今年以来➕${Number(item.yearToDate).toFixed(2)}%💥`);
          }
        });
      }

      if ((data.indexes || []).length) {
        lines.push("—————");
        (data.indexes || []).forEach((item) => {
          lines.push(`【${item.name}】 今日${signedPercent(item.dailyReturn)}`);
        });
      }

      lines.push("");
      lines.push(`（⚠️数据来源：${data.source || "wind"}，截至${data.asOf || "-"}，基金有风险，投资需谨慎）`);
      return lines.join("\n");
    }

    function normalizePayload(payload) {
      if (Array.isArray(payload.banks)) return payload;
      return {
        version: 1,
        defaultBank: "cmb",
        banks: [{ ...payload, id: "cmb", name: "招行" }]
      };
    }

    function bankFromPayload(payload) {
      const normalized = normalizePayload(payload);
      const bank = normalized.banks.find((item) => item.id === selectedBankId)
        || normalized.banks.find((item) => item.id === normalized.defaultBank)
        || normalized.banks[0];
      selectedBankId = bank?.id || "";
      return bank;
    }

    function renderBankOptions(payload) {
      const normalized = normalizePayload(payload);
      bankSelect.innerHTML = normalized.banks.map((bank) => (
        `<option value="${escapeHtml(bank.id)}">${escapeHtml(bank.name)}</option>`
      )).join("");
      bankSelect.value = selectedBankId || normalized.defaultBank || normalized.banks[0]?.id || "";
    }

    function render(data) {
      latestPayload = normalizePayload(data);
      const bank = bankFromPayload(latestPayload);
      renderBankOptions(latestPayload);
      title.textContent = bank.title || "大成·招行重点持营业绩速览";
      if (Array.isArray(bank.lines)) {
        content.innerHTML = renderTemplateLines(bank.lines);
      } else {
        content.innerHTML = [
          ...(bank.groups || []).map(renderGroup),
          renderFeatured(bank.featured || []),
          renderIndexes(bank.indexes || [])
        ].join("");
      }
      status.textContent = `数据日期：${bank.asOf || "-"}　更新时间：${bank.updatedAt || "-"}`;
      footer.textContent = bank.footer || `（⚠️数据来源：${bank.source || "wind"}，截至${bank.asOf || "-"}，基金有风险，投资需谨慎）`;
      latestWechatText = buildWechatText(bank);
      wechatText.textContent = latestWechatText;
    }

    async function loadData() {
      refresh.disabled = true;
      status.textContent = "正在读取最新数据...";
      try {
        const response = await fetch(`${DATA_URL}?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        render(data);
      } catch (error) {
        content.innerHTML = `<div class="error">没有读取到数据文件。请确认 data/performance.json 与 index.html 放在同一网站目录下。</div>`;
        wechatText.textContent = "没有读取到数据，暂时无法生成微信文案。";
        status.textContent = "读取失败";
      } finally {
        refresh.disabled = false;
      }
    }

    function switchBank() {
      selectedBankId = bankSelect.value;
      localStorage.setItem("selectedBank", selectedBankId);
      const url = new URL(window.location.href);
      url.searchParams.set("bank", selectedBankId);
      window.history.replaceState({}, "", url);
      if (latestPayload) render(latestPayload);
    }

    async function copyWechatText() {
      if (!latestWechatText) return;
      copyWechat.disabled = true;
      try {
        await navigator.clipboard.writeText(latestWechatText);
        copyWechat.textContent = "已复制";
        setTimeout(() => {
          copyWechat.textContent = "复制微信文案";
        }, 1600);
      } catch (error) {
        const range = document.createRange();
        const selection = window.getSelection();
        range.selectNodeContents(wechatText);
        selection.removeAllRanges();
        selection.addRange(range);
        copyWechat.textContent = "已选中，请复制";
        setTimeout(() => {
          copyWechat.textContent = "复制微信文案";
        }, 1600);
      } finally {
        copyWechat.disabled = false;
      }
    }

    refresh.addEventListener("click", loadData);
    bankSelect.addEventListener("change", switchBank);
    copyWechat.addEventListener("click", copyWechatText);
    loadData();
    setInterval(loadData, 24 * 60 * 60 * 1000);
  </script>
</body>
</html>
