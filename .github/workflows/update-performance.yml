name: Update performance data

on:
  workflow_dispatch:
  schedule:
    - cron: "10 13 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Update data
        run: python scripts/update_daily_data.py
      - name: Commit changed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/performance.json
          git diff --cached --quiet || git commit -m "Update performance data"
          git push
