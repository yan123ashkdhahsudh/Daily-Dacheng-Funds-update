name: Update performance data

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. These run at 21:10, 22:10, 23:10 and 00:10 Beijing time.
    - cron: "30 10 * * *"
    - cron: "50 11 * * *"
    - cron: "00 12 * * *"
    - cron: "10 12 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Update data
        run: python scripts/update_daily_data.py
      - name: Commit changed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/performance.json
          git diff --cached --quiet || git commit -m "Update performance data"
          git push
